<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoToZaHit! - Zgadnij Piosenkę</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(187, 134, 252, 0.15) 0%, rgba(0,0,0,0) 40%),
                radial-gradient(circle at 90% 90%, rgba(3, 218, 198, 0.15) 0%, rgba(0,0,0,0) 40%);
            background-attachment: fixed;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .side-stats {
            position: absolute;
            left: 5vw;
            background: rgba(30, 30, 30, 0.9);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #333;
            text-align: center;
            min-width: 100px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .streak-label {
            color: #bb86fc;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .streak-value {
            font-size: 3rem;
            font-weight: bold;
            color: #ff9800;
            text-shadow: 0 0 15px rgba(255, 152, 0, 0.6);
        }

        .game-container {
            background-color: #1e1e1e;
            padding: 2.5rem;
            border-radius: 25px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6);
            max-width: 550px;
            width: 90%;
            border: 1px solid #333;
            position: relative;
            z-index: 1;
            text-align: center;
            transition: transform 0.1s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
        }

        .shake {
            animation: shake 0.3s ease-in-out;
            border-color: #cf6679 !important;
        }

        img.logo {
            width: 120px;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 15px rgba(187, 134, 252, 0.4));
            animation: pulseLogo 2s infinite ease-in-out;
        }

        @keyframes pulseLogo {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(187, 134, 252, 0.4)); }
            50% { transform: scale(1.08); filter: drop-shadow(0 0 25px rgba(187, 134, 252, 0.7)); }
        }

        .music-note {
            position: fixed;
            color: rgba(255, 255, 255, 0.1);
            font-size: 2rem;
            pointer-events: none;
            z-index: -1;
            animation: floatAround 20s linear infinite;
        }

        @keyframes floatAround {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        .vinyl-record {
            position: fixed;
            width: 700px;
            height: 700px;
            background: repeating-radial-gradient(circle at center, #1a1a1a 0px, #1a1a1a 2px, #222222 3px, #222222 5px);
            border-radius: 50%;
            border: 20px solid #000;
            opacity: 0.25;
            z-index: -2;
            right: -300px;
            bottom: -200px;
            animation: spinRecord 60s linear infinite;
        }

        @keyframes spinRecord { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        h1 { color: #bb86fc; margin-bottom: 0.5rem; font-size: 2rem; }

        .navigation-arrows {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #03dac6;
            border: 1px solid #444;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover { background: #03dac6; color: #121212; transform: scale(1.1); }

        #lyrics-container {
            background: #252525;
            padding: 2rem;
            border-radius: 15px;
            margin: 1.5rem 0;
            font-style: italic;
            font-size: 1.2rem;
            line-height: 1.6;
            border-left: 6px solid #03dac6;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            box-sizing: border-box;
            border-radius: 10px;
            border: 2px solid #333;
            background: #121212;
            color: white;
            font-size: 1.1rem;
            margin-bottom: 10px;
            outline: none;
        }

        input[type="text"]:focus { border-color: #bb86fc; }

        .main-btn {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            background-color: #03dac6;
            color: #000;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .main-btn:hover { background-color: #018786; transform: translateY(-2px); }

        #hint-container { margin-top: 1.5rem; }

        .hint-text {
            color: #ffffff;
            display: block;
            margin-top: 10px;
            padding: 12px;
            background: rgba(187, 134, 252, 0.1);
            border-left: 4px solid #bb86fc;
            border-radius: 5px;
            text-align: left;
        }

        .confetti { position: fixed; width: 10px; height: 10px; z-index: 1000; pointer-events: none; }

        @media (max-width: 900px) {
            .side-stats { position: relative; left: 0; margin-bottom: 20px; }
            body { flex-direction: column; overflow-y: auto; padding: 20px 0; }
        }
    </style>
</head>
<body>
    {% load static %}

    <div id="notes-container"></div>
    <div class="vinyl-record"></div>

    <div class="side-stats">
        <div class="streak-label">Streak 🔥</div>
        <div id="streak-counter" class="streak-value">0</div>
    </div>

    <div class="game-container" id="game-box">
        <img src="{% static 'cotozahit.png' %}" alt="logo" class="logo">
        <h1>CoToZaHit!</h1>
        <p style="font-size: 0.9rem; color: #888;">Zgadnij tytuł piosenki po fragmencie tekstu</p>
        
        <div class="navigation-arrows">
            <button class="nav-btn" onclick="fetchRandomSong()">❮</button>
            <span style="font-size: 0.7rem; color: #555; letter-spacing: 2px;">NAWIGACJA</span>
            <button class="nav-btn" onclick="fetchRandomSong()">❯</button>
        </div>

        <div id="lyrics-container">Ładowanie tekstu...</div>

        <div class="input-group">
            <input type="text" id="user-answer" placeholder="Wpisz tytuł..." onkeypress="if(event.key === 'Enter') checkAnswer()">
            <button class="main-btn" onclick="checkAnswer()">Zgadnij!</button>
        </div>

        <div id="hint-container"></div>
    </div>

    <script>
        let attempts = 0;
        let streak = 0;

        function updateStreak(reset = false) {
            streak = reset ? 0 : streak + 1;
            document.getElementById('streak-counter').innerText = streak;
        }

        function triggerShake() {
            const box = document.getElementById('game-box');
            box.classList.add('shake');
            setTimeout(() => box.classList.remove('shake'), 300);
        }

        function createFloatingNotes() {
            const container = document.getElementById('notes-container');
            const symbols = ['♪', '♫', '♩', '♬', '♭', '♯'];
            setInterval(() => {
                const n = document.createElement('div');
                n.className = 'music-note';
                n.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                n.style.left = Math.random() * 100 + 'vw';
                n.style.fontSize = (Math.random() * 2 + 1) + 'rem';
                n.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(n);
                n.addEventListener('animationend', () => n.remove());
            }, 3000);
        }

        function fireConfetti() {
            const colors = ['#bb86fc', '#03dac6', '#ff9800', '#ffffff'];
            for (let i = 0; i < 80; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                c.style.left = '50%'; c.style.top = '50%';
                const a = Math.random() * Math.PI * 2;
                const v = Math.random() * 10 + 5;
                let vx = Math.cos(a) * v; let vy = Math.sin(a) * v;
                let x = 0; let y = 0; let o = 1;
                document.body.appendChild(c);
                const anim = () => {
                    x += vx; y += vy + 0.5; o -= 0.02;
                    c.style.transform = `translate(${x}px, ${y}px) rotate(${x*4}deg)`;
                    c.style.opacity = o;
                    if (o > 0) requestAnimationFrame(anim); else c.remove();
                };
                requestAnimationFrame(anim);
            }
        }

        async function fetchRandomSong() {
            try {
                const response = await fetch('/api/random-song/');
                const data = await response.json();
                const container = document.getElementById('lyrics-container');
                container.innerText = data.snippet;
                container.dataset.songId = data.id;
                attempts = 0;
                document.getElementById('hint-container').innerHTML = "";
                document.getElementById('user-answer').value = "";
                document.getElementById('user-answer').focus();
            } catch (e) { console.error(e); }
        }

        async function checkAnswer() {
            const input = document.getElementById('user-answer');
            const songId = document.getElementById('lyrics-container').dataset.songId;
            const hintBox = document.getElementById('hint-container');
            if (!input.value.trim()) return;

            const res = await fetch('/api/check-answer/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
                body: JSON.stringify({ id: songId, answer: input.value })
            });
            const data = await res.json();

            if (data.is_correct) {
                fireConfetti();
                updateStreak(false);
                hintBox.style.color = "#03dac6";
                hintBox.innerHTML = "<strong>DOBRZE!</strong>";
                setTimeout(fetchRandomSong, 2000);
            } else {
                triggerShake();
                attempts++;
                hintBox.style.color = "#cf6679";
                if (attempts === 1) {
                    hintBox.innerHTML = "<strong>Błąd!</strong><span class='hint-text'>Wskazówka 1: " + data.second_snippet + "</span>";
                } else if (attempts === 2) {
                    hintBox.innerHTML += "<span class='hint-text'>Wskazówka 2 (Wykonawca): " + data.artist + "</span>";
                } else {
                    updateStreak(true);
                    hintBox.innerHTML = "<strong>KONIEC!</strong><br>To było: " + data.correct_title;
                    setTimeout(fetchRandomSong, 3000);
                }
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight" || e.key === "ArrowLeft") fetchRandomSong();
        });

        document.addEventListener('DOMContentLoaded', () => {
            fetchRandomSong();
            createFloatingNotes();
        });
    </script>
</body>
</html>
